<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeerDrop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px #0001; padding: 40px; max-width: 480px; width: 100%; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    p.sub { color: #64748b; margin-bottom: 32px; font-size: 14px; }
    .drop-zone { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all .2s; margin-bottom: 16px; }
    .drop-zone:hover, .drop-zone.over { border-color: #3b82f6; background: #eff6ff; }
    .drop-zone .icon { font-size: 40px; margin-bottom: 8px; }
    .drop-zone p { color: #64748b; font-size: 14px; }
    .file-info { background: #f1f5f9; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 14px; }
    .file-info strong { display: block; font-size: 15px; margin-bottom: 2px; }
    button { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background .2s; }
    button:hover { background: #2563eb; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .link-box { background: #f1f5f9; border-radius: 8px; padding: 12px 16px; margin: 16px 0; word-break: break-all; font-size: 13px; color: #334155; }
    .copy-btn { margin-top: 8px; padding: 10px; font-size: 14px; background: #0f172a; }
    .copy-btn:hover { background: #1e293b; }
    .status { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 8px; background: #f1f5f9; margin: 16px 0; font-size: 14px; font-weight: 500; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.yellow { background: #eab308; }
    .dot.blue   { background: #3b82f6; animation: pulse 1s infinite; }
    .dot.green  { background: #22c55e; }
    .dot.red    { background: #ef4444; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
    .progress-wrap { margin: 16px 0; }
    .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: #64748b; margin-bottom: 6px; }
    .progress-bar { height: 10px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: #3b82f6; border-radius: 99px; transition: width .3s; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
    .stat { background: #f8fafc; border-radius: 8px; padding: 10px 14px; font-size: 13px; }
    .stat span { display: block; color: #94a3b8; font-size: 11px; margin-bottom: 2px; }
    .download-btn { background: #16a34a; margin-top: 16px; }
    .download-btn:hover { background: #15803d; }
    .error { color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px 16px; font-size: 14px; margin: 12px 0; }
    .hidden { display: none; }
    #input-file { display: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>⚡ PeerDrop</h1>
  <p class="sub">Browser-to-browser file transfer. No servers, no uploads.</p>

  <!-- SENDER VIEW -->
  <div id="sender-view">
    <div class="drop-zone" id="drop-zone">
      <div class="icon">📁</div>
      <p>Drop a file here or <strong>click to browse</strong></p>
      <input type="file" id="input-file" />
    </div>
    <div class="file-info hidden" id="file-info">
      <strong id="file-name"></strong>
      <span id="file-size" style="color:#64748b;font-size:13px"></span>
    </div>
    <button id="create-btn" disabled>Select a file first</button>
    <div class="hidden" id="room-section">
      <div class="status"><div class="dot" id="status-dot"></div><span id="status-text"></span></div>
      <div class="link-box" id="room-link"></div>
      <button class="copy-btn" id="copy-btn">Copy Link</button>
    </div>
    <div class="progress-wrap hidden" id="sender-progress">
      <div class="progress-label"><span>Sending...</span><span id="sender-pct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="sender-fill" style="width:0%"></div></div>
      <div class="stats">
        <div class="stat"><span>Speed</span><strong id="sender-speed">—</strong></div>
        <div class="stat"><span>ETA</span><strong id="sender-eta">—</strong></div>
      </div>
    </div>
    <div class="hidden" id="sender-done" style="text-align:center;padding:20px;color:#16a34a;font-weight:700;font-size:18px">✓ Transfer Complete!</div>
  </div>

  <!-- RECEIVER VIEW -->
  <div id="receiver-view" class="hidden">
    <div class="status"><div class="dot" id="rx-dot"></div><span id="rx-status">Connecting to room...</span></div>
    <div class="hidden" id="rx-file-info" style="margin:16px 0">
      <div class="file-info">
        <strong id="rx-file-name"></strong>
        <span id="rx-file-size" style="color:#64748b;font-size:13px"></span>
      </div>
    </div>
    <div class="progress-wrap hidden" id="rx-progress">
      <div class="progress-label"><span>Receiving...</span><span id="rx-pct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="rx-fill" style="width:0%"></div></div>
      <div class="stats">
        <div class="stat"><span>Speed</span><strong id="rx-speed">—</strong></div>
        <div class="stat"><span>ETA</span><strong id="rx-eta">—</strong></div>
      </div>
    </div>
    <a id="download-btn" class="hidden" style="display:none">
      <button class="download-btn" style="margin-top:16px">⬇ Download File</button>
    </a>
    <div class="error hidden" id="rx-error"></div>
  </div>
</div>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<script>
const SERVER_URL = 'https://quickshare2qt.onrender.com';
const CHUNK_SIZE = 64 * 1024;

// ── Helpers ──────────────────────────────────────────────
function fmt(bytes) {
  if (!bytes) return '0 B';
  const u = ['B','KB','MB','GB'];
  let i = 0, n = bytes;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return `${n.toFixed(1)} ${u[i]}`;
}
function fmtEta(s) {
  if (!s || s <= 0 || !isFinite(s)) return '—';
  return s < 60 ? `${Math.ceil(s)}s` : `${Math.floor(s/60)}m ${Math.ceil(s%60)}s`;
}
async function sha256(data) {
  const buf = await crypto.subtle.digest('SHA-256', data instanceof Blob ? await data.arrayBuffer() : data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Fetch TURN servers ────────────────────────────────────
async function getIceServers() {
  try {
    const res = await fetch('https://lukieee.metered.live/api/v1/turn/credentials?apiKey=71b0f0927625d50cd5dcc2addab7b97d908a');
    return await res.json();
  } catch {
    return [{ urls: 'stun:stun.l.google.com:19302' }];
  }
}

// ── Detect sender vs receiver ─────────────────────────────
const roomIdFromUrl = location.pathname.startsWith('/room/')
  ? location.pathname.split('/room/')[1]
  : null;

const isSender = !roomIdFromUrl;

document.getElementById('sender-view').classList.toggle('hidden', !isSender);
document.getElementById('receiver-view').classList.toggle('hidden', isSender);

// ── Socket ────────────────────────────────────────────────
const socket = io(SERVER_URL, { transports: ['websocket', 'polling'] });

// ══════════════════════════════════════════════════════════
// SENDER
// ══════════════════════════════════════════════════════════
if (isSender) {
  let selectedFile = null;
  let roomId = null;
  let pc = null;
  let dc = null;

  const dropZone  = document.getElementById('drop-zone');
  const fileInput = document.getElementById('input-file');
  const createBtn = document.getElementById('create-btn');
  const fileInfo  = document.getElementById('file-info');
  const roomSec   = document.getElementById('room-section');
  const roomLink  = document.getElementById('room-link');
  const copyBtn   = document.getElementById('copy-btn');
  const statusDot = document.getElementById('status-dot');
  const statusTxt = document.getElementById('status-text');

  const MAX_SIZE = 50 * 1024 * 1024;

  function setFile(f) {
    if (f.size > MAX_SIZE) {
      alert(`File too large: ${fmt(f.size)}. Maximum is 50MB.`);
      return;
    }
    selectedFile = f;
    document.getElementById('file-name').textContent = f.name;
    document.getElementById('file-size').textContent = fmt(f.size);
    fileInfo.classList.remove('hidden');
    createBtn.disabled = false;
    createBtn.textContent = 'Create Room & Get Link';
  }

  function setStatus(state) {
    const map = {
      waiting:    ['yellow', 'Waiting for receiver to join…'],
      connecting: ['blue',   'Connecting…'],
      connected:  ['green',  'Connected — sending file…'],
      failed:     ['red',    'Connection failed. Please refresh.'],
      completed:  ['green',  'Done!'],
    };
    const [color, text] = map[state] || ['yellow', state];
    statusDot.className = `dot ${color}`;
    statusTxt.textContent = text;
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });

  createBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    createBtn.disabled = true;
    createBtn.textContent = 'Creating room…';
    socket.emit('create-room');
  });

  socket.on('room-created', ({ roomId: id }) => {
    roomId = id;
    const link = `${location.origin}/room/${id}`;
    roomLink.textContent = link;
    roomSec.classList.remove('hidden');
    setStatus('waiting');
    createBtn.classList.add('hidden');
  });

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(`${location.origin}/room/${roomId}`);
    copyBtn.textContent = 'Copied!';
    setTimeout(() => copyBtn.textContent = 'Copy Link', 2000);
  });

  socket.on('peer-joined', async () => {
    setStatus('connecting');
    const iceServers = await getIceServers();
    pc = new RTCPeerConnection({ iceServers });

    dc = pc.createDataChannel('file', { ordered: true });

    pc.onicecandidate = e => {
      if (e.candidate) socket.emit('ice-candidate', { roomId, candidate: e.candidate });
    };

    pc.onconnectionstatechange = () => {
  if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
    setStatus('failed');
  }
};

dc.onopen = () => {
  setStatus('connected');
  startSending();
};

    socket.on('answer', async answer => {
      await pc.setRemoteDescription(new RTCSessionDescription(answer));
    });

    socket.on('ice-candidate', async candidate => {
      try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
    });

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('offer', { roomId, offer });
  });

  async function startSending() {
    const file = selectedFile;
    const hash = await sha256(file);
    const progress = document.getElementById('sender-progress');
    const fill     = document.getElementById('sender-fill');
    const pct      = document.getElementById('sender-pct');
    const spd      = document.getElementById('sender-speed');
    const eta      = document.getElementById('sender-eta');

    progress.classList.remove('hidden');

    dc.send(JSON.stringify({ type: 'meta', name: file.name, size: file.size, mime: file.type, hash }));

    let offset = 0;
    const start = Date.now();

    function sendChunk() {
      while (offset < file.size) {
        if (dc.bufferedAmount > CHUNK_SIZE * 16) {
          setTimeout(sendChunk, 50);
          return;
        }
        const slice = file.slice(offset, offset + CHUNK_SIZE);
        slice.arrayBuffer().then(buf => {
          dc.send(buf);
          offset += buf.byteLength;

          const elapsed = (Date.now() - start) / 1000;
          const speed = elapsed > 0 ? offset / elapsed : 0;
          const remaining = (file.size - offset) / (speed || 1);
          const p = (offset / file.size) * 100;

          fill.style.width = `${p}%`;
          pct.textContent = `${p.toFixed(0)}%`;
          spd.textContent = `${fmt(speed)}/s`;
          eta.textContent = fmtEta(remaining);

          if (offset >= file.size) {
            dc.send(JSON.stringify({ type: 'done' }));
            document.getElementById('sender-done').classList.remove('hidden');
            setStatus('completed');
          } else {
            sendChunk();
          }
        });
        break;
      }
    }
    sendChunk();
  }
}

// ══════════════════════════════════════════════════════════
// RECEIVER
// ══════════════════════════════════════════════════════════
if (!isSender) {
  let pc = null;
  let chunks = [];
  let meta = null;
  let received = 0;
  let startTime = null;

  const rxDot    = document.getElementById('rx-dot');
  const rxStatus = document.getElementById('rx-status');
  const rxError  = document.getElementById('rx-error');

  function setRxStatus(state) {
    const map = {
      joining:     ['blue',   'Joining room…'],
      waiting:     ['yellow', 'Waiting for sender…'],
      connecting:  ['blue',   'Connecting…'],
      receiving:   ['blue',   'Receiving file…'],
      done:        ['green',  'Transfer complete — file verified ✓'],
      failed:      ['red',    'Connection failed. Please refresh.'],
      error:       ['red',    'Verification failed!'],
    };
    const [color, text] = map[state] || ['yellow', state];
    rxDot.className = `dot ${color}`;
    rxStatus.textContent = text;
  }

  setRxStatus('joining');
  socket.emit('join-room', { roomId: roomIdFromUrl });

  socket.on('room-error', ({ message }) => {
    rxError.textContent = message;
    rxError.classList.remove('hidden');
    setRxStatus('failed');
  });

  socket.on('room-joined', () => setRxStatus('waiting'));

  socket.on('offer', async offer => {
    setRxStatus('connecting');
    const iceServers = await getIceServers();
    pc = new RTCPeerConnection({ iceServers });

    pc.onicecandidate = e => {
      if (e.candidate) socket.emit('ice-candidate', { roomId: roomIdFromUrl, candidate: e.candidate });
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
        setRxStatus('failed');
      }
    };

    socket.on('ice-candidate', async candidate => {
      try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
    });

    pc.ondatachannel = e => {
      const channel = e.channel;
      channel.binaryType = 'arraybuffer';

      channel.onmessage = async event => {
        if (typeof event.data === 'string') {
          const msg = JSON.parse(event.data);

          if (msg.type === 'meta') {
            meta = msg;
            received = 0;
            chunks = [];
            startTime = Date.now();
            document.getElementById('rx-file-name').textContent = msg.name;
            document.getElementById('rx-file-size').textContent = fmt(msg.size);
            document.getElementById('rx-file-info').classList.remove('hidden');
            document.getElementById('rx-progress').classList.remove('hidden');
            setRxStatus('receiving');
          }

          if (msg.type === 'done') {
            const blob = new Blob(chunks, { type: meta.mime });
            const computedHash = await sha256(blob);
            const verified = computedHash === meta.hash;

            if (verified) {
              setRxStatus('done');
            } else {
              setRxStatus('error');
            }

            const url = URL.createObjectURL(blob);
            const a = document.getElementById('download-btn');
            a.href = url;
            a.download = meta.name;
            a.style.display = "block";
            // auto-trigger download
            const autoA = document.createElement("a");
            autoA.href = url;
            autoA.download = meta.name;
            autoA.click();
            a.classList.remove('hidden');
          }
          return;
        }

        chunks.push(event.data);
        received += event.data.byteLength;

        const elapsed = (Date.now() - startTime) / 1000;
        const speed = elapsed > 0 ? received / elapsed : 0;
        const remaining = (meta.size - received) / (speed || 1);
        const p = (received / meta.size) * 100;

        document.getElementById('rx-fill').style.width = `${p}%`;
        document.getElementById('rx-pct').textContent = `${p.toFixed(0)}%`;
        document.getElementById('rx-speed').textContent = `${fmt(speed)}/s`;
        document.getElementById('rx-eta').textContent = fmtEta(remaining);
      };
    };

    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('answer', { roomId: roomIdFromUrl, answer });
  });

  socket.on('peer-disconnected', () => {
    if (rxStatus.textContent !== 'Transfer complete — file verified ✓') {
      setRxStatus('failed');
      rxError.textContent = 'Sender disconnected.';
      rxError.classList.remove('hidden');
    }
  });
}
</script>
</body>
</html>
